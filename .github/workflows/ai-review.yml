name: AI Review

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches:
      - main

concurrency:
  group: ai-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write
  checks: read
  issues: read

jobs:
  review:
    name: Reviewer Agent
    # Opt-in: set repo variable AI_REVIEW_ENABLED=true to run automatic reviews.
    # Default / unset → skip (manual /rev remains the primary path).
    if: ${{ vars.AI_REVIEW_ENABLED == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Run Reviewer Agent
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GEMINI_API_KEY_REVIEWER: ${{ secrets.GEMINI_API_KEY_REVIEWER }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          CI_CHECK_NAME: 'lint · test · build'
          GEMINI_MODEL: gemini-2.0-flash
        run: node .github/scripts/ai-review.mjs
