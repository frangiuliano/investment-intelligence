services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: investment_intelligence
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d investment_intelligence']
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - '3000:3000'
    env_file:
      - .env
    environment:
      PORT: 3000
      # Always use the Compose service hostname inside the network
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/investment_intelligence
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
